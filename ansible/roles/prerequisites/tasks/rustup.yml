---
- name: Detect rustup
  ansible.builtin.shell: command -v rustup
  args:
    executable: /bin/bash
  changed_when: false
  failed_when: false
  register: prerequisites_rustup_command
  tags:
    - bootstrap
    - rustup

- name: Install Rustup when missing
  ansible.builtin.shell: |
    set -euo pipefail
    curl --proto '=https' --tlsv1.2 -fsSL https://sh.rustup.rs | sh -s -- -y --profile default
  args:
    executable: /bin/bash
    creates: "{{ dotfiles_home_dir }}/.cargo/bin/rustup"
  when:
    - common_system in ['Darwin', 'Linux']
    - prerequisites_rustup_command.rc != 0
  tags:
    - bootstrap
    - rustup

- name: Install Rustup components
  ansible.builtin.shell: |
    set -euo pipefail
    rustup_bin="{{ dotfiles_home_dir }}/.cargo/bin/rustup"
    if [ ! -x "$rustup_bin" ]; then
      rustup_bin=$(command -v rustup)
    fi
    exec "$rustup_bin" toolchain install stable \
      --profile default \
      --component rustfmt \
      --component clippy \
      --component rust-analyzer \
      --component rust-src
  args:
    executable: /bin/bash
  changed_when: "'unchanged' not in prerequisites_rustup_toolchain.stderr"
  failed_when: prerequisites_rustup_toolchain.rc != 0
  register: prerequisites_rustup_toolchain
  when: prerequisites_rustup_command.rc == 0 or common_system in ['Darwin', 'Linux']
  tags:
    - bootstrap
    - rustup
