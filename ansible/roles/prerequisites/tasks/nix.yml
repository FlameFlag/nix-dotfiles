---
- name: Detect Nix
  ansible.builtin.shell: command -v nix
  args:
    executable: /bin/bash
  changed_when: false
  failed_when: false
  register: prerequisites_nix_command
  tags:
    - bootstrap
    - nix

- name: Detect managed Nix wrapper
  ansible.builtin.shell: |
    test -f "{{ dotfiles_bin_dir }}/nix" &&
      grep -q 'nix-dotfiles: immutable-container-wrapper' "{{ dotfiles_bin_dir }}/nix"
  args:
    executable: /bin/bash
  changed_when: false
  failed_when: false
  register: prerequisites_managed_nix_wrapper
  tags:
    - bootstrap
    - nix

- name: Install Distrobox-backed Nix wrapper when host Nix is missing
  ansible.builtin.copy:
    dest: "{{ dotfiles_bin_dir }}/nix"
    mode: "0755"
    content: |
      #!/bin/sh
      # nix-dotfiles: immutable-container-wrapper
      # name: fedora-nix
      exec distrobox enter --name fedora-nix -- /nix/var/nix/profiles/default/bin/nix "$@"
  when:
    - prerequisites_nix_command.rc != 0 or prerequisites_managed_nix_wrapper.rc == 0
    - common_is_linux
  tags:
    - bootstrap
    - nix

- name: Install Determinate Nix on macOS when missing
  ansible.builtin.shell: |
    set -euo pipefail
    curl --proto '=https' --tlsv1.2 -fsSL https://install.determinate.systems/nix | sh -s -- install --no-confirm
  args:
    executable: /bin/bash
    creates: /nix/var/nix/profiles/default/bin/nix
  when:
    - common_is_macos
    - prerequisites_nix_command.rc != 0
  tags:
    - bootstrap
    - nix
