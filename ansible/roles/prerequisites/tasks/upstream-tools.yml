---
- name: Install chezmoi with upstream installer when missing
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL --retry 3 https://get.chezmoi.io | sh -s -- -b "{{ dotfiles_bin_dir }}"
  args:
    executable: /bin/bash
    creates: "{{ dotfiles_bin_dir }}/chezmoi"
  when: common_system in ['Darwin', 'Linux']
  tags:
    - bootstrap
    - chezmoi

- name: Install uv with upstream installer when missing
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL --retry 3 https://astral.sh/uv/install.sh | env UV_INSTALL_DIR="{{ dotfiles_bin_dir }}" sh
  args:
    executable: /bin/bash
    creates: "{{ dotfiles_bin_dir }}/uv"
  when: common_system in ['Darwin', 'Linux']
  tags:
    - bootstrap
    - uv

- name: Install Bun with upstream installer when missing
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL --retry 3 https://bun.sh/install | env BUN_INSTALL="{{ dotfiles_home_dir }}/.cache/.bun" bash
  args:
    executable: /bin/bash
    creates: "{{ dotfiles_home_dir }}/.cache/.bun/bin/bun"
  when: common_system in ['Darwin', 'Linux']
  tags:
    - bootstrap
    - bun

- name: Detect SOPS
  ansible.builtin.shell: command -v sops
  args:
    executable: /bin/bash
  changed_when: false
  failed_when: false
  register: prerequisites_sops_command
  tags:
    - bootstrap
    - sops

- name: Install SOPS with upstream release when missing
  ansible.builtin.shell: |
    set -euo pipefail
    case "$(uname -s):$(uname -m)" in
      Linux:x86_64) os=linux; arch=amd64 ;;
      Linux:aarch64) os=linux; arch=arm64 ;;
      Darwin:arm64) os=darwin; arch=arm64 ;;
      Darwin:x86_64) os=darwin; arch=amd64 ;;
      *)
        printf '%s\n' "unsupported SOPS platform: $(uname -s):$(uname -m)" >&2
        exit 1
        ;;
    esac
    latest_url=https://api.github.com/repos/getsops/sops/releases/latest
    tag=$(
      curl -fsSL --retry 3 "$latest_url" |
        sed -n 's/.*"tag_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' |
        head -n 1
    )
    test -n "$tag"
    asset="sops-${tag}.${os}.${arch}"
    mkdir -p "{{ dotfiles_cache_dir }}/sops" "{{ dotfiles_bin_dir }}"
    curl -fsSL --retry 3 -o "{{ dotfiles_cache_dir }}/sops/${asset}" "https://github.com/getsops/sops/releases/download/${tag}/${asset}"
    chmod 0755 "{{ dotfiles_cache_dir }}/sops/${asset}"
    ln -sfn "{{ dotfiles_cache_dir }}/sops/${asset}" "{{ dotfiles_bin_dir }}/sops"
  args:
    executable: /bin/bash
  changed_when: true
  when: prerequisites_sops_command.rc != 0
  tags:
    - bootstrap
    - sops
