---
- name: Install apt bootstrap packages
  ansible.builtin.apt:
    name: "{{ prerequisites_bootstrap_packages.apt + prerequisites_build_toolchain_packages.apt }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when:
    - not common_has_rpm_ostree
    - ansible_facts.pkg_mgr == 'apt'
  tags:
    - bootstrap
    - packages

- name: Install dnf bootstrap packages
  ansible.builtin.dnf:
    name: "{{ prerequisites_bootstrap_packages.dnf + prerequisites_build_toolchain_packages.dnf }}"
    state: present
  become: true
  when:
    - not common_has_rpm_ostree
    - ansible_facts.pkg_mgr in ['dnf', 'dnf5']
  tags:
    - bootstrap
    - packages

- name: Install pacman bootstrap packages
  community.general.pacman:
    name: "{{ prerequisites_bootstrap_packages.pacman + prerequisites_build_toolchain_packages.pacman }}"
    state: present
    update_cache: true
  become: true
  when:
    - not common_has_rpm_ostree
    - ansible_facts.pkg_mgr == 'pacman'
  tags:
    - bootstrap
    - packages

- name: Install apk bootstrap packages
  community.general.apk:
    name: "{{ prerequisites_bootstrap_packages.apk + prerequisites_build_toolchain_packages.apk }}"
    state: present
    update_cache: true
  become: true
  when:
    - not common_has_rpm_ostree
    - ansible_facts.pkg_mgr == 'apk'
  tags:
    - bootstrap
    - packages
