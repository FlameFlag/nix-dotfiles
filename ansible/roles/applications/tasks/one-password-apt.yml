---
- name: Create 1Password apt key directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  become: true
  loop:
    - /usr/share/keyrings
    - /etc/debsig/policies/AC2D62742012EA22
    - /usr/share/debsig/keyrings/AC2D62742012EA22

- name: Download 1Password signing key
  ansible.builtin.get_url:
    url: https://downloads.1password.com/linux/keys/1password.asc
    dest: "{{ dotfiles_cache_dir }}/1password.asc"
    mode: "0644"
  register: applications_onepassword_apt_key

- name: Check 1Password debsig key
  ansible.builtin.stat:
    path: /usr/share/debsig/keyrings/AC2D62742012EA22/debsig.gpg
  register: applications_onepassword_debsig_key

- name: Install 1Password debsig key when needed
  ansible.builtin.command:
    argv:
      - gpg
      - --dearmor
      - --yes
      - --output
      - /usr/share/debsig/keyrings/AC2D62742012EA22/debsig.gpg
      - "{{ dotfiles_cache_dir }}/1password.asc"
  become: true
  changed_when: true
  when: applications_onepassword_apt_key.changed or not applications_onepassword_debsig_key.stat.exists

- name: Install 1Password debsig policy
  ansible.builtin.get_url:
    url: https://downloads.1password.com/linux/debian/debsig/1password.pol
    dest: /etc/debsig/policies/AC2D62742012EA22/1password.pol
    mode: "0644"
  become: true

- name: Detect dpkg architecture
  ansible.builtin.command:
    argv:
      - dpkg
      - --print-architecture
  changed_when: false
  register: applications_dpkg_architecture

- name: Remove legacy 1Password apt repository
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/1password.list
    state: absent
  become: true
  notify: Refresh apt cache

- name: Add 1Password apt repository
  ansible.builtin.deb822_repository:
    name: 1password
    uris:
      - "https://downloads.1password.com/linux/debian/{{ applications_dpkg_architecture.stdout }}"
    suites:
      - stable
    components:
      - main
    architectures:
      - "{{ applications_dpkg_architecture.stdout }}"
    signed_by: https://downloads.1password.com/linux/keys/1password.asc
    install_python_debian: true
  become: true
  register: applications_onepassword_apt_repository
  notify: Refresh apt cache

- name: Apply pending apt repository cache refresh
  ansible.builtin.meta: flush_handlers

- name: Install 1Password with apt
  ansible.builtin.apt:
    name:
      - 1password
      - 1password-cli
    state: present
  become: true
