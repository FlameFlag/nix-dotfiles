---
ecosystem_image_provided_binstall_skip_packages:
  - bat
  - du-dust
  - eza
  - fd-find
  - git-delta
  - gitui
  - hexyl
  - hyperfine
  - procs
  - ripgrep

ecosystem_bun_global_packages:
  - package: "@openai/codex"
    bin: codex
  - package: "@earendil-works/pi-coding-agent"
    bin: pi

ecosystem_uv_tools:
  - package: ansible-core
    bin: ansible
    install_args:
      - --with
      - ansible
  - package: ansible-lint
    bin: ansible-lint
    install_args:
      - --python
      - "3.13"
      - --with
      - ansible
  - package: yt-dlp
    bin: yt-dlp
  - package: ruff
    bin: ruff
  - package: ty
    bin: ty

ecosystem_binstall_tools:
  - package: ripgrep
    bin: rg
  - package: fd-find
    bin: fd
  - package: bat
    bin: bat
  - package: eza
    bin: eza
  - package: git-delta
    bin: delta
  - package: gitui
    bin: gitui
  - package: bottom
    bin: btm
  - package: du-dust
    bin: dust
  - package: sd
    bin: sd
  - package: xh
    bin: xh
  - package: yazi-fm
    bin: yazi
  - package: yazi-cli
    bin: ya
  - package: zellij
    bin: zellij
  - package: hyperfine
    bin: hyperfine
  - package: hexyl
    bin: hexyl
  - package: procs
    bin: procs
  - package: broot
    bin: broot
