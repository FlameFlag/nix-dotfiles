---
- name: Install uv tools
  ansible.builtin.command:
    argv: "{{ [dotfiles_bin_dir + '/uv', 'tool', 'install', '--upgrade'] + (item.install_args | default([])) + [item.package] }}"
  register: ecosystem_uv_tool_install
  changed_when: "'Installed' in ecosystem_uv_tool_install.stdout"
  loop: "{{ ecosystem_uv_tools }}"
  tags:
    - ecosystem
    - uv
