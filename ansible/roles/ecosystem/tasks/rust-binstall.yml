---
- name: Install prebuilt Rust CLI tools
  ansible.builtin.command:
    argv:
      - "{{ dotfiles_home_dir }}/.cargo/bin/cargo-binstall"
      - --no-confirm
      - --strategies
      - crate-meta-data,quick-install
      - "{{ item.package }}"
  args:
    creates: "{{ dotfiles_home_dir }}/.cargo/bin/{{ item.bin }}"
  loop: "{{ ecosystem_binstall_tools }}"
  when:
    - common_system in ['Darwin', 'Linux']
    - not (common_has_rpm_ostree | default(false) and item.package in ecosystem_image_provided_binstall_skip_packages)
  tags:
    - ecosystem
    - binstall
