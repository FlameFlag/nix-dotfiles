---
- name: Configure Tailscale on Bluefin
  ansible.builtin.command:
    argv:
      - bash
      - "{{ dotfiles_ansible_scripts_dir }}/host/apps/tailscale-bluefin.sh"
    chdir: "{{ dotfiles_repo_root }}"
  changed_when: true
  tags:
    - host
    - scripts
    - tailscale

