[workspace]
members = ["pkgs/claude-statusline"]
resolver = "2"

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
opt-level = "z"

# `opt-level = "z"` (size) throws away loop unrolling and vectorization,
# which destroys simd-json's hot loops. Override just the SIMD crates back
# to -O3 so they get autovectorized and the 1.5 MB LiteLLM cold-start
# parse stays fast without bloating the whole binary.
[profile.release.package.simd-json]
opt-level = 3
[profile.release.package.simdutf8]
opt-level = 3
[profile.release.package.value-trait]
opt-level = 3
