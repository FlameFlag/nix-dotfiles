[[runner]]
name = "codex"
programs = [
  "$ZELLIJ_THEME_RUN_CODEX_BIN",
  "$CODEX_ZELLIJ_THEME_CODEX_BIN",
  "codex",
  "~/.bun/bin/codex",
  "~/.cache/.bun/bin/codex",
  "~/.npm/bin/codex",
  "~/.local/bin/codex",
]
default_args = ["--dangerously-bypass-approvals-and-sandbox"]
env_overlay = "codex-trust"
startup_pane_color = true

[[runner]]
name = "btop"
programs = ["btop"]
skip_env = ["ZELLIJ_THEME_RUN_WRAPPER", "BTOP_AUTO_THEME_WRAPPER"]
env_unset = ["NO_COLOR"]
env = ["COLORTERM=truecolor"]

[runner.config]
format = "ini"
default_path = "~/.config/btop/btop.conf"
arg_names = ["--config", "-c"]
output_args = ["--config"]
cache_subdir = "zellij-theme-run/btop"
temp_pattern = "zellij-theme-run-btop-*.conf"

[[runner.config.update]]
path = "color_theme"
dark = "catppuccin_frappe_pink"
light = "catppuccin_latte_pink"
quote = true

[[runner]]
name = "helix"
programs = ["hx", "helix"]
skip_env = ["ZELLIJ_THEME_RUN_WRAPPER", "HELIX_AUTO_THEME_WRAPPER"]

[runner.config]
format = "toml"
default_path = "~/.config/helix/config.toml"
arg_names = ["--config", "-c"]
output_args = ["--config"]
temp_pattern = "zellij-theme-run-helix-*.toml"

[[runner.config.update]]
path = "theme"
dark = "catppuccin_frappe_pink"
light = "catppuccin_latte_pink"

[[runner]]
name = "ghostty"
programs = ["ghostty"]
skip_env = ["ZELLIJ_THEME_RUN_WRAPPER", "GHOSTTY_AUTO_THEME_WRAPPER"]

[[runner.theme_arg]]
dark = "--theme=catppuccin-frappe-pink.conf"
light = "--theme=catppuccin-latte-pink.conf"

[[runner]]
name = "zellij"
programs = ["zellij"]
default_args = [
  "options",
  "--default-layout",
  "compact",
  "--attach-to-session",
  "false",
  "--mirror-session",
  "false",
  "--on-force-close",
  "quit",
]
