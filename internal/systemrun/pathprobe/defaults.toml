shell_probe_candidates = [
  "/bin/zsh",
  "/bin/bash",
  "zsh",
  "bash",
  "sh",
]

user_tool_path_prefixes = [
  ".pi/agent/bin",
  ".bun/bin",
  ".bun/install/global/node_modules/.bin",
  ".cache/.bun/bin",
  ".npm/bin",
  ".local/bin",
  ".cargo/bin",
  ".go/bin",
  ".yarn/bin",
]

[shell_probe_flags]
bash = "-lic"
zsh = "-lic"
