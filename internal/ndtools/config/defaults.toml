manifest_path = "{{ .ConfigHome }}/nix-dotfiles/tool-updates.toml"
lock_name = "nd-tools-update.lock"

path_prefixes = [
  "{{ .Home }}/.bun/bin",
  "{{ .Home }}/.bun/install/global/node_modules/.bin",
  "{{ .Home }}/.cache/.bun/bin",
  "{{ .Home }}/.local/share/nix-dotfiles/immutable/bin",
  "{{ .Home }}/.local/bin",
  "{{ .Home }}/.cargo/bin",
]

[immutable]
container = "fedora-nix"

[schedule]
name = "nd-tools-update"
interval_hours = 6
start_delay_minutes = 10

[[providers]]
name = "bun-global"
argv = ["bun", "install", "--global", "{{ .Package }}"]
required = ["name", "provider", "package"]

[[providers]]
name = "uv-tool"
argv = ["uv", "tool", "upgrade", "{{ .Package }}"]
required = ["name", "provider", "package"]

[[providers]]
name = "uv-tool-source"
argv = [
  "uv",
  "tool",
  "install",
  "--force",
  "--reinstall",
  "--refresh",
  "{{ .Package }} @ {{ .Source }}",
]
required = ["name", "provider", "package", "source"]
