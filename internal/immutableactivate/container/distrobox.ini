[fedora-nix]
image=registry.fedoraproject.org/fedora:latest
init=false
start_now=true
additional_packages="curl git shadow-utils sudo xz"
init_hooks=if ! command -v nix >/dev/null 2>&1; then export PATH="/usr/local/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"; curl -sSfL "https://artifacts.nixos.org/nix-installer" | sh -s -- install linux --extra-conf "sandbox = false" --enable-flakes --init none --no-confirm; chown -R "${container_user_uid}:${container_user_gid}" /nix; fi;
