name: Zig

on:
  pull_request: null
  push: null
  workflow_dispatch: null

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  zig:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5.0.0

      - name: Read Bootstrap Zig Artifact
        run: |
          set -eu
          awk '
            $1 !~ /^#/ && $2 == "x86_64-linux" {
              print "ZIG_VERSION="$1
              print "ZIG_URL="$3
              print "ZIG_SHA256="$4
              exit
            }
          ' bootstrap/zig-artifacts.tsv >> "$GITHUB_ENV"

      - name: Install Zig
        run: |
          mkdir -p "$RUNNER_TEMP/zig"
          curl --fail --location --silent --show-error "$ZIG_URL" --output "$RUNNER_TEMP/zig.tar.xz"
          echo "$ZIG_SHA256  $RUNNER_TEMP/zig.tar.xz" | sha256sum --check -
          tar --extract --xz --file "$RUNNER_TEMP/zig.tar.xz" --directory "$RUNNER_TEMP/zig" --strip-components 1
          echo "$RUNNER_TEMP/zig" >> "$GITHUB_PATH"

      - name: Check Zig version
        run: test "$(zig version)" = "$ZIG_VERSION"

      - name: Check Zig formatting
        run: |
          zig fmt --check .ziglint.zon build.zig
          find \
            bootstrap/dev_tools \
            lib/zig \
            dotfiles/.chezmoi-lib \
            pkgs/gh-hide-comment \
            pkgs/lenovo-con-mode \
            -name '*.zig' \
            -print0 \
            | xargs -0 zig fmt --check

      - name: Install Zig linter
        run: |
          mkdir -p "$RUNNER_TEMP/ziglint"
          curl \
            --fail \
            --location \
            --silent \
            --show-error \
            https://github.com/rockorager/ziglint/releases/latest/download/ziglint-x86_64-linux.tar.gz \
            --output "$RUNNER_TEMP/ziglint-x86_64-linux.tar.gz"
          curl \
            --fail \
            --location \
            --silent \
            --show-error \
            https://github.com/rockorager/ziglint/releases/latest/download/checksums.txt \
            --output "$RUNNER_TEMP/ziglint-checksums.txt"
          grep '  ziglint-x86_64-linux.tar.gz$' "$RUNNER_TEMP/ziglint-checksums.txt" > "$RUNNER_TEMP/ziglint-checksum.txt"
          (cd "$RUNNER_TEMP" && sha256sum --check ziglint-checksum.txt)
          tar --extract --gzip --file "$RUNNER_TEMP/ziglint-x86_64-linux.tar.gz" --directory "$RUNNER_TEMP/ziglint"
          echo "$RUNNER_TEMP/ziglint" >> "$GITHUB_PATH"

      - name: Lint Zig code
        run: ziglint

      - name: Check Zig code
        run: zig build check

      - name: Test Zig code
        run: zig build test
