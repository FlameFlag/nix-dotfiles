name: Zig

on:
  pull_request: null
  push: null
  workflow_dispatch: null

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  zig:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5.0.0

      - name: Install Nix
        uses: cachix/install-nix-action@v31.7.0
        with:
          github_access_token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Read Bootstrap Zig Artifact
        run: |
          set -eu
          awk '
            $1 !~ /^#/ && $2 == "x86_64-linux" {
              print "ZIG_VERSION="$1
              print "ZIG_URL="$3
              print "ZIG_SHA256="$4
              exit
            }
          ' bootstrap/zig-artifacts.tsv >> "$GITHUB_ENV"

      - name: Install Zig
        run: |
          mkdir -p "$RUNNER_TEMP/zig"
          curl --fail --location --silent --show-error "$ZIG_URL" --output "$RUNNER_TEMP/zig.tar.xz"
          echo "$ZIG_SHA256  $RUNNER_TEMP/zig.tar.xz" | sha256sum --check -
          tar --extract --xz --file "$RUNNER_TEMP/zig.tar.xz" --directory "$RUNNER_TEMP/zig" --strip-components 1
          echo "$RUNNER_TEMP/zig" >> "$GITHUB_PATH"

      - name: Check Zig version
        run: test "$(zig version)" = "$ZIG_VERSION"

      - name: Check Zig formatting
        run: |
          zig fmt --check .ziglint.zon build.zig
          find \
            bootstrap/dev_tools \
            lib/zig \
            dotfiles/.chezmoi-lib \
            pkgs/gh-hide-comment \
            pkgs/lenovo-con-mode \
            -name '*.zig' \
            -print0 \
            | xargs -0 zig fmt --check

      - name: Build Zig linter
        run: nix build --print-build-logs .#ziglint

      - name: Lint Zig code
        run: ./result/bin/ziglint

      - name: Check Zig code
        run: zig build check

      - name: Test Zig code
        run: zig build test
