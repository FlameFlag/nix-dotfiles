name: Update GitHub Actions

on:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch: null

concurrency:
  group: update-github-actions
  cancel-in-progress: false

permissions:
  contents: read # needed to checkout repository contents

jobs:
  update:
    name: Update Action Pins
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to push workflow pin updates
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Update Pins
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          nix shell \
            github:NixOS/nixpkgs/nixos-unstable#pinact \
            github:NixOS/nixpkgs/nixos-unstable#zizmor \
            -c bash -euo pipefail -c '
              pinact run --update
              pinact run --verify
              zizmor --persona=pedantic .
            '

      - name: Commit Updates
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if git diff --quiet -- .github/workflows; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows
          git commit -m "chore: update GitHub Actions pins"
          git push \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:${GITHUB_REF_NAME}"
