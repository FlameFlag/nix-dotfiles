name: Check the Flake

on:
  pull_request: null
  push: null
  workflow_dispatch: null

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read # needed to checkout repository contents

jobs:
  linux-check:
    name: Linux Flake Check
    runs-on: ubuntu-latest
    permissions:
      contents: read # needed to checkout repository contents
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Run Flake Checker
        uses: DeterminateSystems/flake-checker-action@3164002371bc90729c68af0e24d5aacf20d7c9f6 # v12
        with:
          check-outdated: true
          check-owner: true
          check-supported: true
          fail-mode: true
          ignore-missing-flake-lock: false

      - name: Check Linux Configuration
        run: nix flake check --show-trace

  darwin-check:
    name: Darwin Flake Check
    runs-on: macos-latest
    permissions:
      contents: read # needed to checkout repository contents
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Check Darwin Configuration
        run: sudo nix run nix-darwin -- check --flake .#FlameFlags-Mac-mini
