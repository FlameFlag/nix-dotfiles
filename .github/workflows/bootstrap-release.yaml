name: Bootstrap Rolling Release

on:
  push:
    paths:
      - "bootstrap/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/bootstrap-release.yaml"
  workflow_dispatch: null

concurrency:
  group: bootstrap-rolling-release
  cancel-in-progress: true

permissions:
  contents: read # needed to checkout repository contents

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read # needed to checkout repository contents
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset: linux-x86_64
            binary: bootstrap
          - runner: macos-latest
            asset: macos-aarch64
            binary: bootstrap
          - runner: windows-latest
            asset: windows-x86_64.exe
            binary: bootstrap.exe
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build bootstrap
        run: cargo build --locked --release --bin bootstrap

      - name: Stage Binary
        shell: bash
        env:
          ASSET: ${{ matrix.asset }}
          BINARY: ${{ matrix.binary }}
        run: |
          mkdir -p dist
          cp "target/release/${BINARY}" "dist/bootstrap-${ASSET}"

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bootstrap-${{ matrix.asset }}
          path: dist/bootstrap-${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish Rolling Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write # needed to move the rolling tag and publish the release
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download Binary Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Move Rolling Tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git tag --force bootstrap-rolling "${GITHUB_SHA}"
          git push --force \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            refs/tags/bootstrap-rolling

      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view bootstrap-rolling >/dev/null 2>&1; then
            gh release edit bootstrap-rolling \
              --title "Bootstrap Rolling Release" \
              --notes "Rolling bootstrap binaries for bootstrapping nix-dotfiles." \
              --latest
            gh release upload bootstrap-rolling dist/bootstrap-* --clobber
          else
            gh release create bootstrap-rolling dist/bootstrap-* \
              --title "Bootstrap Rolling Release" \
              --notes "Rolling bootstrap binaries for bootstrapping nix-dotfiles." \
              --latest
          fi
