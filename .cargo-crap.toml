threshold = 30.0
fail-above = true

# Waived functions are command dispatchers, installer/process orchestration,
# macOS app mutation paths, or live TTY integration. Pure parsing/selection
# helpers should stay covered instead of being added here.
allow = [
  "Tty::*",
  "apply_config",
  "clear_quarantine",
  "codesign_beta_app",
  "install_action",
  "install_archive",
  "install_catppuccin_theme",
  "install_current_exe",
  "install_file",
  "install_manager",
  "install_one",
  "install_or_update",
  "install_plugins",
  "install_source_build",
  "install_vs_extensions",
  "link_applications",
  "nushell_init",
  "patch",
  "proxy_lsp",
  "query_terminal_theme",
  "run_bootstrap_cli",
  "run_chezmoi_support",
  "run_gh_hide_comment",
  "run_lenovo_con_mode",
  "shell_init",
  "window_management",
  "write_completion_files",
]
