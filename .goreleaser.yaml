version: 2

project_name: nix-dotfiles

before:
  hooks:
    - go mod tidy

builds:
  - &build_defaults
    id: chezmoi-support
    main: ./cmd/chezmoi-support
    binary: chezmoi-support
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

  - <<: *build_defaults
    id: helium-browser
    main: ./cmd/helium-browser
    binary: helium-browser

  - <<: *build_defaults
    id: http-fixture
    main: ./cmd/http-fixture
    binary: http-fixture

  - <<: *build_defaults
    id: immutable-activate
    main: ./cmd/immutable-activate
    binary: immutable-activate

  - <<: *build_defaults
    id: lenovo-con-mode
    main: ./cmd/lenovo-con-mode
    binary: lenovo-con-mode

  - <<: *build_defaults
    id: lsp-diagnostic-filter
    main: ./cmd/lsp-diagnostic-filter
    binary: lsp-diagnostic-filter

  - <<: *build_defaults
    id: system-run-mcp
    main: ./cmd/system-run-mcp
    binary: system-run-mcp

  - <<: *build_defaults
    id: system-runner
    main: ./cmd/system-runner
    binary: system-runner

  - <<: *build_defaults
    id: zellij-theme-run
    main: ./cmd/zellij-theme-run
    binary: zellij-theme-run

archives:
  - id: platform-binaries
    ids:
      - chezmoi-support
      - helium-browser
      - http-fixture
      - immutable-activate
      - lenovo-con-mode
      - lsp-diagnostic-filter
      - system-run-mcp
      - system-runner
      - zellij-theme-run
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    wrap_in_directory: true
    files:
      - LICENSE.txt

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "0.0.0-next.{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
